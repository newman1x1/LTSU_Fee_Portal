name: Keep Supabase Alive

on:
  schedule:
    # Runs every Wednesday and Saturday at 06:00 UTC (11:30 AM IST)
    - cron: "0 6 * * 3,6"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          echo "Pinging Supabase to prevent free tier pausing..."

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "Response status: $RESPONSE"

          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 500 ]; then
            echo "Supabase is alive and responding! (HTTP $RESPONSE)"
          else
            echo "Supabase ping failed with status: $RESPONSE"
            exit 1
          fi
